name: process-transactions

# Runs the parser on a schedule (every 30 min) and on manual trigger.
# Reads new raw_events from Supabase, writes normalized transactions.
# Also keeps the free Supabase project from auto-pausing.

on:
  schedule:
    # Times are UTC; you are Asia/Bangkok (UTC+7).
    # 02:00/10:00/13:00/19:00/21:00 BKK -> 19/03/06/12/14 UTC
    - cron: "0 3,6,12,14,19 * * *"
  workflow_dispatch: {}

# Avoid overlapping runs if one is slow.
concurrency:
  group: process-transactions
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Tesseract OCR (Thai + English)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tesseract-ocr tesseract-ocr-tha

      - name: Install dependencies
        run: pip install -r requirements-processor.txt

      - name: Run processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOCAL_TZ: Asia/Bangkok
        run: python -m src.process

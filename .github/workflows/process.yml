name: process-transactions

# Runs the parser on a schedule (every 30 min) and on manual trigger.
# Reads new raw_events from Supabase, writes normalized transactions.
# Also keeps the free Supabase project from auto-pausing.

on:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes (UTC)
  workflow_dispatch: {} # manual "Run workflow" button

# Avoid overlapping runs if one is slow.
concurrency:
  group: process-transactions
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-processor.txt

      - name: Run processor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          LOCAL_TZ: Asia/Bangkok
        run: python -m src.process
